<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="basic_toggle.css">
</head>
<body>
<div id="content">
<div id="txt"></div>
<div id="newTxt"></div>
<div id="countdown"></div>
<h2>Start Timer</h2>
<div  class="btn-group" role = "group" style="display:flex; flex-direction: column; width: 100%; align-items: center;"> 
  <div class="slider-container" style="margin-top: 20px; display: flex;">
  <input type="range" min="0" max="90" value="15" class="slider" id ="minSlider">
  <div class="labels">
    <span>0</span>
    <span>15</span>
    <span>30</span>
    <span>45</span>
    <span>60</span>
    <span>75</span>
    <span>90</span>
  </div>
  <div id = "slideText"></div>
  </div>
  <h4 style="margin-top: 20px;">Manual Input</h4>
  <!-- forms -->
<div style="flex-direction: column; margin-left: 5px;">
  <input class="form-control" type="number" min="0" placeholder="Hours" id="hours">
  <input class="form-control" type="number" min="0" placeholder="Minutes" id="minutes">
</div>
<div id="incorrect" style="color: red; display: none;">Please enter a number greater than 0</div>
<div style="margin: 5px; width: 100%">
    <button class="btn btn-secondary"style="width:40%; border-radius: 50px; background-color:#4BBA41; color:#FFFFFF" id="start">Start</button>
    <button class="btn btn-secondary"style="width:40%; border-radius: 50px; background-color:#26c4f0; color:#FFFFFF" id="add">Add Websites</button>
</div>
<button class="bigRedButton" id="focusMode"><span>Focus Mode</span></button>
</div>
</div>
<script src="basic_toggle.js"></script>
</body>
</html>
