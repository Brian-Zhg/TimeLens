<!DOCTYPE html>
<meta charset="UTF-8">

<head>
    <link rel="stylesheet" href="basic_toggle.css">
</head>
<html style="width: 400px; height: 300px;">

<body>
    <h2>Blocked Websites</h2>
    <div>
        <span id="backButton" style="cursor:pointer; font-size:30px; display: inline-block;">←</span>
        <input type="text" id="websiteInput" placeholder="Enter a website">
        <button id="addWebsite">Add</button>
        <u style="color: red; cursor:pointer; " id="clear">Clear All</u>
    </div>
    <h style="display: none; color:red;" id="included">Already Included</h>
    <h style="display: none; color:red;" id="invalid">Invalid Domain</h>
    <div id="listContainer" style="
    display: flex;
    flex-direction: column;  /* stack items vertically */
    align-items: flex-start; /* hug the left wall */
     width: 375px;   /* fixed width */
    height: 500px;  /* fixed height */
">
    </div>
</body>

</html>
